<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Diseño de la Página</h2>
    <button (click)="saveSettings()" [disabled]="isUploading" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors disabled:opacity-50 flex items-center gap-2">
      <span *ngIf="isUploading" class="animate-spin text-sm">⏳</span>
      Guardar Cambios
    </button>
  </div>

  <div *ngIf="isLoading" class="text-center py-12 text-gray-500">
    Cargando configuración...
  </div>

  <div *ngIf="!isLoading" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    
    <!-- Hero Section -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
      <h3 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b">Inicio (Hero Section)</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Título Principal</label>
          <input type="text" [(ngModel)]="formData.heroTitle" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Subtítulo</label>
          <input type="text" [(ngModel)]="formData.heroSubtitle" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Descripción Breve</label>
          <textarea [(ngModel)]="formData.heroDescription" rows="3" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow"></textarea>
        </div>
      </div>
    </div>

    <!-- Pop Up Section -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
      <div class="flex justify-between items-center mb-4 pb-2 border-b">
        <h3 class="text-lg font-bold text-gray-800">Anuncio Pop-Up</h3>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" [(ngModel)]="formData.popUpEnabled" class="sr-only peer">
          <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
          <span class="ml-3 text-sm font-medium text-gray-700">{{ formData.popUpEnabled ? 'Activado' : 'Desactivado' }}</span>
        </label>
      </div>

      <div class="space-y-4" [ngClass]="{'opacity-50 pointer-events-none': !formData.popUpEnabled}">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Título del Anuncio</label>
          <input type="text" [(ngModel)]="formData.popUpTitle" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Contenido / Texto</label>
          <textarea [(ngModel)]="formData.popUpContent" rows="3" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Enlace del Botón (Opcional)</label>
          <input type="text" [(ngModel)]="formData.popUpLinkUrl" placeholder="https://ejemplo.com" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Imagen Promocional (Opcional)</label>
          <div class="flex items-center gap-4">
            <div *ngIf="imagePreview" class="w-24 h-24 rounded-lg overflow-hidden border border-gray-200 bg-gray-50 flex-shrink-0">
              <img [src]="imagePreview" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
              <input type="file" (change)="onFileSelected($event)" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sobre la Liga Section -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 lg:col-span-2">
      <h3 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b">Sobre la Liga (Institucional)</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Misión</label>
          <textarea [(ngModel)]="formData.aboutMission" rows="5" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Visión</label>
          <textarea [(ngModel)]="formData.aboutVision" rows="5" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow"></textarea>
        </div>
      </div>
    </div>

  </div>
</div>

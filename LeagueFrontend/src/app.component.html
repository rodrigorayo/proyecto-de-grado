
<router-outlet></router-outlet>

@if (alertService.currentAlert(); as alert) {
  <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[9999]">
    <div class="bg-white rounded-2xl shadow-2xl border border-gray-100 max-w-md w-full p-6 mx-4 transform scale-100 transition-all duration-300">
      <div class="flex items-center gap-3 mb-4">
        @if (alert.type === 'confirm') {
          <div class="w-12 h-12 rounded-full bg-yellow-50 text-yellow-500 flex items-center justify-center text-2xl">
            ❓
          </div>
        } @else if (alert.alertType === 'success') {
          <div class="w-12 h-12 rounded-full bg-green-50 text-green-500 flex items-center justify-center text-2xl">
            ✅
          </div>
        } @else if (alert.alertType === 'error') {
          <div class="w-12 h-12 rounded-full bg-red-50 text-red-500 flex items-center justify-center text-2xl">
            ❌
          </div>
        } @else {
          <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-2xl">
            ℹ️
          </div>
        }
        
        <div>
          <h3 class="text-lg font-bold text-gray-900 leading-tight">{{ alert.title }}</h3>
        </div>
      </div>
      
      <p class="text-sm text-gray-600 mb-6 whitespace-pre-line">{{ alert.message }}</p>
      
      <div class="flex gap-3 justify-end">
        @if (alert.type === 'confirm') {
          <button (click)="alert.resolve?.(false)" 
                  class="px-4 py-2 border border-gray-200 text-gray-600 font-bold rounded-lg hover:bg-gray-50 active:scale-95 transition-all text-sm">
            Cancelar
          </button>
          <button (click)="alert.resolve?.(true)" 
                  class="px-5 py-2 bg-[#388e14] hover:bg-[#2e7d32] text-white font-bold rounded-lg shadow-md active:scale-95 transition-all text-sm">
            Confirmar
          </button>
        } @else {
          <button (click)="alert.resolve?.(true)" 
                  class="px-6 py-2 bg-[#388e14] hover:bg-[#2e7d32] text-white font-bold rounded-lg shadow-md active:scale-95 transition-all text-sm">
            Aceptar
          </button>
        }
      </div>
    </div>
  </div>
}
